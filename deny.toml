[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "GPL-3.0-or-later",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",
]

[advisories]
version = 2
yanked = "warn"
ignore = [
  # Temporary until upstream dependencies remove/replace affected crates:
  # - turso stack removes paste
  # - tonic/qdrant-client stack removes rustls-pemfile
  "RUSTSEC-2024-0436", # paste (transitive via turso)
  "RUSTSEC-2025-0134", # rustls-pemfile (transitive via tonic/qdrant-client)
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
