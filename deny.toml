[graph]
all-features = true

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "GPL-3.0-or-later",
  "BSD-3-Clause",
  "BSD-2-Clause",
  "0BSD",
  "BSL-1.0",
  "CC0-1.0",
  "MPL-2.0",
  "ISC",
  "Zlib",
  "CDLA-Permissive-2.0",
  "Unicode-3.0",
  "LGPL-2.1-only",
  "LGPL-2.1-or-later",
  "LGPL-3.0-only",
  "LGPL-3.0-or-later",
]

[advisories]
version = 2
yanked = "warn"
ignore = [
  # Temporary until upstream dependencies remove/replace affected crates:
  # - turso/lance stack removes paste
  "RUSTSEC-2024-0436", # paste (transitive via turso)
]

[bans]
multiple-versions = "allow"
wildcards = "deny"
